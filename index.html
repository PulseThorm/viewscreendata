<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViewScreenData</title>
    <meta
      name="description"
      content="Vista compacta para inspeccionar datos que expone el navegador."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Browser telemetry</p>
          <h1>Datos visibles</h1>
        </div>
        <div class="actions">
          <button id="refreshBtn" class="primary">Actualizar</button>
          <button id="exportBtn" class="secondary">JSON</button>
        </div>
      </header>

      <section class="grid">
        <article class="panel">
          <div class="panel-head">
            <h2>Browser</h2>
            <span id="envStatus" class="status">Listo</span>
          </div>
          <div id="browserData" class="content"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Screen</h2>
          </div>
          <div id="screenData" class="content"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Network y permisos</h2>
          </div>
          <div id="permissionsData" class="content"></div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <h2>Compatibilidad</h2>
          </div>
          <div id="compatibilityData" class="content"></div>
        </article>
      </section>

      <section class="panel slim">
        <div class="panel-head">
          <h2>JSON</h2>
        </div>
        <pre id="jsonOutput" class="json"></pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
