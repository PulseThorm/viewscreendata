<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViewScreenData</title>
    <meta name="description" content="Vista simple para inspeccionar datos del navegador." />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <div class="topbar">
        <div>
          <div class="eyebrow">Browser telemetry</div>
          <h1>Datos visibles</h1>
        </div>
        <div class="actions">
          <button id="refreshBtn" type="button">Actualizar</button>
        </div>
      </div>

      <section class="panel idbar">
        <h2>Screen ID</h2>
        <div id="screenIdValue" class="idvalue">...</div>
        <div class="idnote">Id generado por la app y guardado en este navegador.</div>
      </section>

      <section class="panel">
        <h2>Browser</h2>
        <div id="browserData" class="content"></div>
      </section>

      <section class="panel">
        <h2>Screen</h2>
        <div id="screenData" class="content"></div>
      </section>

      <section class="panel">
        <h2>Compatibilidad</h2>
        <div id="compatibilityData" class="content"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
