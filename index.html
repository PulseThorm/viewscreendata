<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ViewScreenData</title>
    <meta name="description" content="Vista simple para inspeccionar datos del navegador." />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #08111d;
        color: #e5eefc;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        padding: 8px;
      }

      .wrap {
        width: 100%;
      }

      .topbar {
        margin-bottom: 8px;
      }

      table.headlayout {
        width: 100%;
        border-collapse: separate;
        border-spacing: 8px;
        table-layout: fixed;
        margin-bottom: 8px;
      }

      td.headleft {
        width: 35%;
        vertical-align: top;
      }

      td.headright {
        width: 65%;
        vertical-align: top;
      }

      .eyebrow {
        margin: 0 0 3px;
        color: #7dd3fc;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
      }

      .screenid-inline {
        color: #9eb0c8;
        font-size: 13px;
        font-weight: 400;
        margin-left: 6px;
        word-break: break-all;
      }

      .controls {
        margin-top: 8px;
      }

      button {
        border: 1px solid #33506b;
        background: #102033;
        color: #e5eefc;
        padding: 8px 12px;
        margin-right: 6px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .idbar,
      .panel,
      .statusbar {
        border: 1px solid #24384d;
        background: #0d1827;
        padding: 10px;
      }

      .summaryblock {
        margin-bottom: 8px;
      }

      .statusbar h2 {
        margin: 0 0 6px;
        font-size: 14px;
      }

      .statusline,
      .errorline {
        display: block;
      }

      .statusitem,
      .erroritem {
        display: inline-block;
        margin: 0 8px 6px 0;
        padding: 4px 8px;
        border: 1px solid #223449;
        background: #0a1421;
        font-size: 11px;
        vertical-align: top;
      }

      .statusitem {
        min-width: 90px;
      }

      .erroritem {
        min-width: 140px;
      }

      .statusitem .label,
      .erroritem .label {
        display: block;
        color: #9eb0c8;
        margin-bottom: 2px;
      }

      .statusitem .value,
      .erroritem .value {
        display: block;
        margin: 0;
        font-size: 12px;
        word-break: break-word;
      }

      .statusmeta {
        margin: 0 0 6px;
        color: #9eb0c8;
        font-size: 11px;
        clear: both;
      }

      .idvalue {
        display: block;
        font-size: 16px;
        font-weight: 700;
        word-break: break-all;
      }

      .idnote {
        display: block;
        margin-top: 4px;
        color: #9eb0c8;
        font-size: 11px;
      }

      table.layout {
        width: 100%;
        border-collapse: separate;
        border-spacing: 8px;
        table-layout: fixed;
      }

      td.col {
        width: 25%;
        vertical-align: top;
      }

      .panel h2 {
        margin: 0 0 6px;
        font-size: 14px;
      }

      .row {
        border: 1px solid #223449;
        background: #0a1421;
        padding: 6px 8px;
        margin-bottom: 6px;
      }

      .key {
        margin: 0;
        color: #9eb0c8;
        font-size: 11px;
      }

      .value {
        margin: 2px 0 0;
        font-size: 13px;
        word-break: break-word;
      }

      .small {
        color: #9eb0c8;
        font-size: 11px;
      }

      .errorrow {
        border-color: #6b2c2c;
        background: #1a0c0c;
      }

      @media (max-width: 900px) {
        body {
          padding: 4px;
        }

        table.layout {
          border-spacing: 4px;
        }

        h1 {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <table class="headlayout" cellspacing="0" cellpadding="0">
        <tr>
          <td class="headleft">
            <div class="topbar">
              <div class="eyebrow">Browser telemetry</div>
              <h1>Datos visibles <span id="screenIdValue" class="screenid-inline">...</span></h1>

              <div class="controls">
                <button id="refreshBtn" type="button">Actualizar</button>
              </div>  
              
            </div>
          </td>
          <td class="headright">
            <div class="summaryblock statusbar">
              <h2>Estado y errores</h2>
              <div id="statusData" class="statusline"></div>
              <div class="statusmeta">Si una funcion falla, aparece aqui sin detener el resto de la pagina.</div>
              <div id="errorData" class="errorline"></div>
            </div>
          </td>
        </tr>
      </table>

      <table class="layout" cellspacing="0" cellpadding="0">
        <tr>
          <td class="col">
            <div class="panel">
              <h2>Browser</h2>
              <div id="browserData"></div>
            </div>
          </td>
          <td class="col">
            <div class="panel">
              <h2>Screen</h2>
              <div id="screenData"></div>
            </div>
          </td>
          <td class="col">
            <div class="panel">
              <h2>Runtime</h2>
              <div id="runtimeData"></div>
            </div>
          </td>
          <td class="col">
            <div class="panel">
              <h2>Compatibilidad</h2>
              <div id="compatibilityData"></div>
            </div>
          </td>
        </tr>
      </table>
    </div>

    <script>
      (function () {
        var browserDataEl = document.getElementById("browserData");
        var screenDataEl = document.getElementById("screenData");
        var runtimeDataEl = document.getElementById("runtimeData");
        var compatibilityDataEl = document.getElementById("compatibilityData");
        var screenIdValueEl = document.getElementById("screenIdValue");
        var statusDataEl = document.getElementById("statusData");
        var errorDataEl = document.getElementById("errorData");
        var refreshBtn = document.getElementById("refreshBtn");

        var state = {
          status: "Listo",
          lastRefresh: "Nunca",
          errors: []
        };

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function describeError(error) {
          var message = "Error desconocido";

          if (!error) {
            return message;
          }

          if (typeof error === "string") {
            return error;
          }

          if (error.message) {
            message = error.message;
          } else {
            try {
              message = String(error);
            } catch (e) {}
          }

          if (error.stack) {
            message += " | " + error.stack;
          }

          return message;
        }

        function row(label, value) {
          return '<div class="row"><div class="key">' + escapeHtml(label) + '</div><div class="value">' + escapeHtml(value) + '</div></div>';
        }

        function chip(label, value, kind) {
          var cls = kind === "error" ? "erroritem" : "statusitem";
          return '<span class="' + cls + '"><span class="label">' + escapeHtml(label) + '</span><span class="value">' + escapeHtml(value) + '</span></span>';
        }

        function renderRows(target, rows) {
          var html = "";
          var i;

          for (i = 0; i < rows.length; i += 1) {
            html += row(rows[i][0], rows[i][1]);
          }

          target.innerHTML = html;
        }

        function pushError(scope, error) {
          var entries = state.errors;

          entries[entries.length] = [scope, describeError(error)];

          if (entries.length > 6) {
            entries.shift();
          }

          renderMeta();
          renderErrorLog();
        }

        function renderMeta() {
          statusDataEl.innerHTML =
            chip("Estado", state.status) +
            chip("Refresh", state.lastRefresh) +
            chip("Errores", String(state.errors.length));
        }

        function renderErrorLog() {
          var html = "";
          var i;

          if (!state.errors.length) {
            errorDataEl.innerHTML = '<span class="small">Sin errores detectados</span>';
            return;
          }

          for (i = 0; i < state.errors.length; i += 1) {
            html += chip(state.errors[i][0], state.errors[i][1], "error");
          }

          errorDataEl.innerHTML = html;
        }

        function hashString(input) {
          var hash = 0;
          var i;

          for (i = 0; i < input.length; i += 1) {
            hash = ((hash << 5) - hash) + input.charCodeAt(i);
            hash |= 0;
          }

          return "sid-" + (hash >>> 0).toString(16);
        }

        function getScreenId() {
          var screen = window.screen || {};
          var parts = [
            navigator.userAgent || "",
            navigator.platform || "",
            navigator.language || "",
            screen.width || 0,
            screen.height || 0,
            screen.availWidth || 0,
            screen.availHeight || 0,
            screen.colorDepth || 0,
            window.devicePixelRatio || 1
          ];

          return hashString(parts.join("|"));
        }

        function getTimeZone() {
          try {
            if (window.Intl && Intl.DateTimeFormat) {
              return Intl.DateTimeFormat().resolvedOptions().timeZone || "No disponible";
            }
          } catch (error) {}

          return "No disponible";
        }

        function getConnectionValue(key) {
          var connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;

          if (!connection) {
            return "No disponible";
          }

          try {
            return connection[key] !== undefined && connection[key] !== null ? connection[key] : "No disponible";
          } catch (error) {
            return "No disponible";
          }
        }

        function hasPermissionsApi() {
          try {
            return !!(navigator.permissions && navigator.permissions.query);
          } catch (error) {
            return false;
          }
        }

        function hasNetworkInformationApi() {
          try {
            return !!(navigator.connection || navigator.mozConnection || navigator.webkitConnection);
          } catch (error) {
            return false;
          }
        }

        function safeRender(sectionName, target, builder) {
          try {
            renderRows(target, builder());
          } catch (error) {
            pushError(sectionName, error);
            renderRows(target, [["Error", describeError(error)]]);
          }
        }

        function buildBrowserRows(screenId) {
          return [
            ["screenId", screenId],
            ["userAgent", navigator.userAgent || "No disponible"],
            ["platform", navigator.platform || "No disponible"],
            ["language", navigator.language || "No disponible"],
            ["cookies", navigator.cookieEnabled ? "true" : "false"],
            ["online", navigator.onLine ? "true" : "false"],
            ["hardwareConcurrency", navigator.hardwareConcurrency || "No disponible"],
            ["deviceMemory", navigator.deviceMemory !== undefined ? navigator.deviceMemory : "No disponible"],
            ["maxTouchPoints", navigator.maxTouchPoints !== undefined ? navigator.maxTouchPoints : "0"],
            ["referrer", document.referrer || "Ninguno"]
          ];
        }

        function buildScreenRows() {
          var screen = window.screen || {};

          return [
            ["width", screen.width || "No disponible"],
            ["height", screen.height || "No disponible"],
            ["availWidth", screen.availWidth || "No disponible"],
            ["availHeight", screen.availHeight || "No disponible"],
            ["colorDepth", screen.colorDepth || "No disponible"],
            ["pixelDepth", screen.pixelDepth || "No disponible"],
            ["pixelRatio", window.devicePixelRatio || "No disponible"],
            ["innerWidth", window.innerWidth || "No disponible"],
            ["innerHeight", window.innerHeight || "No disponible"]
          ];
        }

        function buildRuntimeRows(screenId) {
          var screen = window.screen || {};

          return [
            ["screenId", screenId],
            ["tizenRuntime", (window.tizen || /Tizen/i.test(navigator.userAgent || "")) ? "true" : "false"],
            ["timeZone", getTimeZone()],
            ["connectionType", getConnectionValue("type")],
            ["effectiveType", getConnectionValue("effectiveType")],
            ["downlink", getConnectionValue("downlink")],
            ["rtt", getConnectionValue("rtt")],
            ["saveData", getConnectionValue("saveData")],
            ["orientation", screen.orientation && screen.orientation.type ? screen.orientation.type : "No disponible"]
          ];
        }

        function buildCompatibilityRows() {
          return [
            ["localStorage", (function () {
              try {
                return window.localStorage ? "true" : "false";
              } catch (error) {
                return "false";
              }
            }())],
            ["permissionsApi", hasPermissionsApi() ? "true" : "false"],
            ["networkInformationApi", hasNetworkInformationApi() ? "true" : "false"],
            ["screenOrientation", window.screen && window.screen.orientation && window.screen.orientation.type ? "true" : "false"]
          ];
        }

        function refreshView() {
          var screenId = getScreenId();

          state.status = "Leyendo";
          renderMeta();

          screenIdValueEl.innerHTML = escapeHtml(screenId);

          safeRender("Browser", browserDataEl, function () {
            return buildBrowserRows(screenId);
          });

          safeRender("Screen", screenDataEl, function () {
            return buildScreenRows();
          });

          safeRender("Runtime", runtimeDataEl, function () {
            return buildRuntimeRows(screenId);
          });

          safeRender("Compatibilidad", compatibilityDataEl, function () {
            return buildCompatibilityRows();
          });

          state.status = "Listo";
          state.lastRefresh = new Date().toString();
          renderMeta();
          renderErrorLog();
        }

        function boot() {
          try {
            renderMeta();
            renderErrorLog();
            refreshView();
          } catch (error) {
            pushError("boot", error);
          }
        }

        function onGlobalError(message, source, line, column, error) {
          pushError("window.onerror", (message || "Error") + " @" + (source || "desconocido") + ":" + (line || 0) + ":" + (column || 0) + (error && error.stack ? " | " + error.stack : ""));
          return false;
        }

        refreshBtn.onclick = function () {
          try {
            refreshView();
          } catch (error) {
            pushError("refreshBtn", error);
          }
        };

        window.onerror = onGlobalError;

        if (window.addEventListener) {
          window.addEventListener("error", function (evt) {
            if (evt && evt.message) {
              pushError("error event", evt.message);
            }
          }, true);

          if ("onunhandledrejection" in window) {
            window.addEventListener("unhandledrejection", function (evt) {
              pushError("unhandledrejection", evt && evt.reason ? evt.reason : "Promise rejection");
            });
          }

          window.addEventListener("resize", function () {
            try {
              refreshView();
            } catch (error) {
              pushError("resize", error);
            }
          });
        }

        boot();
      }());
    </script>
  </body>
</html>
